rules:
- id: fixora-wrapper-handleprofilephotoupload
  patterns:
  - pattern-either:
    - pattern: function handleProfilePhotoUpload(...) { ... }
    - pattern: const handleProfilePhotoUpload = (...) => { ... }
    - pattern: let handleProfilePhotoUpload = (...) => { ... }
    - pattern: var handleProfilePhotoUpload = (...) => { ... }
    - pattern: this.handleProfilePhotoUpload = (...) => { ... }
    - pattern: this.handleProfilePhotoUpload = function(...) { ... }
    - pattern: 'handleProfilePhotoUpload: (...) => { ... }'
    - pattern: 'handleProfilePhotoUpload: function(...) { ... }'
    - pattern: handleProfilePhotoUpload(...) { ... }
    - pattern: handleProfilePhotoUpload = (...) => { ... }
    - pattern: handleProfilePhotoUpload = function(...) { ... }
  - pattern-either:
    - pattern: fetch(...)
    - pattern: $OBJ.fetch(...)
  message: 'XSS via `e.target.files?.[0]`

    Vulnerable Sink: Passes untrusted data directly to `fetch`.'
  severity: WARNING
  languages: &id001
  - javascript
  - typescript
  metadata: &id002
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: XSS
    confidence: MEDIUM
    wrapper_defined_in: frontend/src/pages/UserSettings.tsx
    wraps:
    - fetch
    modules_used:
    - builtins
    vulnerable_parameter: e.target.files?.[0]
    malicious_payload: <script>alert('XSS')</script>
    exploit_explanation: An attacker could upload a malicious file containing JavaScript
      code, which would be executed when the file is processed.
    exploit_injected_example: handleProfilePhotoUpload(e.target.files?.[0] = <script>alert('XSS')</script>)
    impact_summary: An attacker could steal user data, take control of the user's
      account, or perform other malicious actions.
    cwe: &id003
    - CWE-79
    owasp: &id004
    - A03:2021
