rules:
- id: fixora-wrapper-applytojob
  patterns:
  - pattern-either:
    - pattern: function applyToJob(...) { ... }
    - pattern: const applyToJob = (...) => { ... }
    - pattern: let applyToJob = (...) => { ... }
    - pattern: var applyToJob = (...) => { ... }
    - pattern: this.applyToJob = (...) => { ... }
    - pattern: this.applyToJob = function(...) { ... }
    - pattern: 'applyToJob: (...) => { ... }'
    - pattern: 'applyToJob: function(...) { ... }'
    - pattern: applyToJob(...) { ... }
    - pattern: applyToJob = (...) => { ... }
    - pattern: applyToJob = function(...) { ... }
  - pattern-either:
    - pattern: fetch(...)
    - pattern: $OBJ.fetch(...)
  message: 'XSS via `jobId`

    Vulnerable Sink: Passes untrusted data directly to `fetch`.'
  severity: WARNING
  languages: &id001
  - javascript
  - typescript
  metadata: &id002
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: XSS
    confidence: MEDIUM
    wrapper_defined_in: frontend/src/pages/explore-jobs/ExploreJobs.tsx
    wraps:
    - fetch
    modules_used:
    - builtins
    vulnerable_parameter: jobId
    malicious_payload: <script>alert('XSS')</script>
    exploit_explanation: The attacker-controlled jobId is sent in the fetch call,
      allowing for potential XSS injection.
    exploit_injected_example: applyToJob(jobId = <script>alert('XSS')</script>)
    impact_summary: Attackers can inject malicious scripts, potentially leading to
      unauthorized access or data theft.
    cwe:
    - CWE-79
    owasp:
    - A03:2021
- id: fixora-taint-applytojob
  mode: taint
  pattern-sources:
  - pattern: req.$W
  - pattern: request.$W
  - pattern: req.body.$W
  - pattern: req.query.$W
  - pattern: req.params.$W
  - pattern: $ARG
    pattern-inside: function $FUNC(..., $ARG, ...) { ... }
  - pattern: $ARG
    pattern-inside: $FUNC = (..., $ARG, ...) => { ... }
  pattern-sinks:
  - pattern: applyToJob(...)
  - pattern: $OBJ.applyToJob(...)
  message: 'Taint tracked to vulnerable wrapper `applyToJob`.

    XSS via `jobId`

    Vulnerable Sink: Passes untrusted data directly to `fetch`.'
  severity: WARNING
  languages: *id001
  metadata: *id002
