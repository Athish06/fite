  mode: taint
  pattern-sources:
  - pattern: req.$W
  - pattern: request.$W
  - pattern: req.body.$W
  - pattern: req.query.$W
  - pattern: req.params.$W
  - pattern: window.location.$W
  - pattern: document.cookie
  - pattern: fetch(...)
  - pattern: axios(...)
  pattern-sinks:
  - pattern: handleProfilePhotoUpload(...)
  - pattern: $OBJ.handleProfilePhotoUpload(...)
  message: 'Taint tracked to vulnerable wrapper `handleProfilePhotoUpload`.

    XSS via `e.target.files?.[0]`

    Vulnerable Sink: Passes untrusted data directly to `fetch`.'
  severity: WARNING
  languages: *id001
  metadata: *id002
